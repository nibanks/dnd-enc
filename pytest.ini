[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    dndbeyond: tests that require D&D Beyond API access with valid cookies

# Warning settings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = false
log_cli_level = INFO

# Coverage options
addopts = 
    --strict-markers
    --tb=short
    -v

# Test environment
env_files =
    .env.test
